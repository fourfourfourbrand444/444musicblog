<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Listen Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --spotify-green: #1DB954;
    --spotify-black: #191414;
    --spotify-white: #FFFFFF;
    --spotify-light-gray: #B3B3B3;
    --audiomack-orange: #FFA500;
    --boomplay-blue: #0066FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    font-family: 'Montserrat', 'Circular Std', sans-serif;
    background: var(--spotify-black);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Stage background */
  .bg-stage {
    position: fixed;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=1920&q=80');
    background-size: cover;
    background-position: center 30%;
    z-index: 0;
  }

  /* Multi-layer filter overlay for Spotify mood */
  .bg-stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      160deg,
      rgba(25, 20, 20, 0.82) 0%,
      rgba(29, 185, 84, 0.10) 40%,
      rgba(0,0,0,0.88) 100%
    );
    z-index: 1;
  }

  /* Bottom vignette / fade */
  .bg-stage::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, transparent 20%, rgba(0,0,0,0.75) 100%);
    z-index: 2;
  }

  /* Grain texture overlay */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
  }

  /* Page content */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 48px 28px;
    max-width: 420px;
    width: 100%;
  }

  /* Spotify-style logo mark at top */
  .brand-mark {
    margin-bottom: 6px;
    animation: fadeDown 0.7s ease both;
  }

  .brand-mark svg {
    width: 44px;
    height: 44px;
    filter: drop-shadow(0 0 18px rgba(29,185,84,0.45));
  }

  /* Header */
  .header-text {
    text-align: center;
    animation: fadeDown 0.7s 0.1s ease both;
    margin-bottom: 10px;
  }

  .header-text h1 {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--spotify-white);
    line-height: 1.1;
    text-transform: uppercase;
  }

  .header-text h1 span {
    color: var(--spotify-green);
  }

  .header-text p {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--spotify-light-gray);
  }

  /* Divider line */
  .divider {
    width: 48px;
    height: 2px;
    background: var(--spotify-green);
    border-radius: 2px;
    margin-bottom: 4px;
    animation: fadeIn 0.7s 0.2s ease both;
  }

  /* Buttons */
  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 24px;
    border-radius: 56px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 0.4px;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s ease, filter 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    background: rgba(255,255,255,0.08);
    transition: opacity 0.18s;
  }

  .btn:hover::after { opacity: 1; }

  .btn:hover {
    transform: scale(1.035) translateY(-2px);
  }

  .btn:active {
    transform: scale(0.97);
  }

  /* Icon wrapper */
  .btn-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .btn-label {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1px;
  }

  .btn-label span.service {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.72;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .btn-label span.action {
    font-size: 14.5px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .btn-arrow {
    margin-left: auto;
    opacity: 0.7;
    font-size: 18px;
    transition: transform 0.18s;
  }

  .btn:hover .btn-arrow {
    transform: translateX(4px);
    opacity: 1;
  }

  /* Spotify button */
  .btn-spotify {
    background: var(--spotify-green);
    color: #000;
    box-shadow: 0 6px 36px rgba(29,185,84,0.38), 0 2px 8px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-spotify:hover {
    box-shadow: 0 10px 48px rgba(29,185,84,0.55), 0 2px 12px rgba(0,0,0,0.5);
  }

  .btn-spotify .btn-icon {
    background: rgba(0,0,0,0.18);
  }

  /* Audiomack button */
  .btn-audiomack {
    background: #FF6600;
    color: #fff;
    box-shadow: 0 6px 36px rgba(255,102,0,0.35), 0 2px 8px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s 0.42s ease both;
  }

  .btn-audiomack:hover {
    box-shadow: 0 10px 48px rgba(255,102,0,0.5), 0 2px 12px rgba(0,0,0,0.5);
  }

  .btn-audiomack .btn-icon {
    background: rgba(0,0,0,0.15);
  }

  /* Boomplay button */
  .btn-boomplay {
    background: #fff;
    color: #111;
    box-shadow: 0 6px 36px rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.4);
    animation: fadeUp 0.6s 0.54s ease both;
  }

  .btn-boomplay:hover {
    box-shadow: 0 10px 48px rgba(255,255,255,0.28), 0 2px 12px rgba(0,0,0,0.5);
  }

  .btn-boomplay .btn-icon {
    background: rgba(0,0,0,0.07);
  }

  .btn-boomplay .btn-label span.service {
    opacity: 0.5;
    color: #333;
  }

  /* Footer */
  .footer {
    margin-top: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    animation: fadeIn 0.7s 0.7s ease both;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Pulse glow on spotlight */
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.8; }
  }

  .spotlight {
    position: fixed;
    z-index: 2;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 340px;
    height: 520px;
    background: radial-gradient(ellipse at 50% 0%, rgba(29,185,84,0.13) 0%, transparent 70%);
    pointer-events: none;
    animation: glow-pulse 4s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="bg-stage"></div>
<div class="spotlight"></div>
<div class="grain"></div>

<div class="container">

  <!-- Music note / brand icon -->
  <div class="brand-mark">
    <!-- Spotify wordmark-inspired note icon -->
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="22" fill="#1DB954"/>
      <path d="M13 17.5C18.6 15.2 26.4 15.8 31 18.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
      <path d="M14.5 22.5C19.4 20.6 25.6 21.1 29.5 23.5" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M16.2 27C20.2 25.5 24.8 25.9 27.8 27.8" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="header-text">
    <h1>Stream <span>Our</span> PLAYLIST</h1>
    <p>Choose your platform below</p>
  </div>

  <div class="divider"></div>

  <!-- Spotify -->
  <a class="btn btn-spotify" href="https://open.spotify.com/user/31frfy7crckfepbtzdjtjclm7kxm?si=28821c9752d7430e" target="_blank" rel="noopener">
    <div class="btn-icon">
      <!-- Official Spotify logo SVG -->
      <svg width="22" height="22" viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg">
        <path fill="#000" d="M83.996 0C37.622 0 0 37.618 0 83.995c0 46.38 37.622 84 83.996 84 46.381 0 84.006-37.62 84.006-84C168.002 37.618 130.377 0 83.996 0zm38.4 121.11c-1.504 2.463-4.715 3.24-7.178 1.73-19.662-12.01-44.414-14.726-73.566-8.067-2.809.644-5.61-1.116-6.252-3.924-.646-2.81 1.11-5.608 3.924-6.254 31.9-7.293 59.263-4.154 81.337 9.334 2.46 1.51 3.24 4.72 1.735 7.181zm10.25-22.805c-1.89 3.075-5.91 4.045-8.98 2.155-22.51-13.839-56.823-17.846-83.448-9.764-3.453 1.043-7.1-.903-8.148-4.35-1.04-3.453.906-7.093 4.354-8.143 30.413-9.228 68.222-4.758 94.072 11.127 3.07 1.89 4.04 5.91 2.15 8.975zm.88-23.744c-26.99-16.031-71.52-17.505-97.289-9.684-4.138 1.255-8.514-1.081-9.768-5.219-1.254-4.14 1.08-8.513 5.221-9.771 29.581-8.98 78.756-7.245 109.83 11.202 3.73 2.209 4.95 7.016 2.74 10.733-2.2 3.722-7.02 4.949-10.733 2.739z"/>
      </svg>
    </div>
    <div class="btn-label">
      <span class="service">Listen on</span>
      <span class="action">Spotify</span>
    </div>
    <span class="btn-arrow">→</span>
  </a>

  <!-- Audiomack -->
  <a class="btn btn-audiomack" href="https://audiomack.com/444music-playlist" target="_blank" rel="noopener">
    <div class="btn-icon">
      <!-- Audiomack official-style logo -->
      <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="12" fill="none"/>
        <!-- AM waveform-inspired mark -->
        <rect x="10" y="50" width="10" height="35" rx="5" fill="white"/>
        <rect x="26" y="30" width="10" height="55" rx="5" fill="white"/>
        <rect x="42" y="15" width="10" height="70" rx="5" fill="white"/>
        <rect x="58" y="30" width="10" height="55" rx="5" fill="white"/>
        <rect x="74" y="45" width="10" height="40" rx="5" fill="white" opacity="0.85"/>
        <!-- Small dot accent -->
        <circle cx="89" cy="20" r="7" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div class="btn-label">
      <span class="service">Listen on</span>
      <span class="action">Audiomack</span>
    </div>
    <span class="btn-arrow">→</span>
  </a>

  <!-- Boomplay -->
  <a class="btn btn-boomplay" href="https://www.boomplay.com/user/31frfy7crckfepbtzdjtjclm7kxm?si=3817ZiwKSzGQJATY_FGaDA" target="_blank" rel="noopener">
    <div class="btn-icon">
      <!-- Boomplay official-style logo mark -->
      <svg width="26" height="26" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ring -->
        <circle cx="50" cy="50" r="44" fill="none" stroke="#E6002D" stroke-width="10"/>
        <!-- Inner filled circle -->
        <circle cx="50" cy="50" r="18" fill="#E6002D"/>
        <!-- Play triangle hint -->
        <polygon points="44,42 44,58 60,50" fill="white"/>
      </svg>
    </div>
    <div class="btn-label">
      <span class="service">Listen on</span>
      <span class="action">Boomplay</span>
    </div>
    <span class="btn-arrow" style="color:#333;">→</span>
  </a>

  <div class="footer">© 444 Music · All rights reserved</div>
</div>

</body>
</html>
